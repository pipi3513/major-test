<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 전공 커스텀</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #f0f4ff;
    --white: #ffffff;
    --primary: #3d6ee8;
    --primary-light: #eef2ff;
    --accent: #ff8fab;
    --text: #2b2d42;
    --text-muted: #7b7f9e;
    --border: #dde3f8;
    --radius: 20px;
    --shadow: 0 4px 24px rgba(61,110,232,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    background-image: radial-gradient(circle at 10% 20%, rgba(61,110,232,0.07) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(255,143,171,0.08) 0%, transparent 40%);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }
  .wrap { width: 100%; max-width: 600px; }
  .header { text-align: center; margin-bottom: 36px; }
  .header-illust-img { height: 120px; width: auto; margin-bottom: 16px; display: block; margin-left: auto; margin-right: auto; }
  .header h1 { font-family: 'Jua', sans-serif; font-size: clamp(24px, 6vw, 38px); color: var(--primary); line-height: 1.3; margin-bottom: 14px; }
  .header p { color: var(--text-muted); font-size: 15px; line-height: 1.6; background: var(--white); display: inline-block; padding: 10px 22px; border-radius: 100px; border: 1.5px solid var(--border); box-shadow: var(--shadow); }
  
  .card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .card-label { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  
  /* 원본 숫자 색상 유지 */
  .card-num { width: 30px; height: 30px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Jua', sans-serif; font-size: 14px; flex-shrink: 0; }
  .card-num.n1 { background: #fff0f3; color: #ff8fab; border: 1px solid #ffd6e0; }
  .card-num.n2 { background: #fffbea; color: #e6a800; border: 1px solid #ffe566; }
  .card-num.n3 { background: #eef2ff; color: #3d6ee8; border: 1px solid #c5d4f8; }

  .card-title { font-size: 15px; font-weight: 700; font-family: 'Jua', sans-serif; }
  
  select, input[type="text"] { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); font-size: 14px; padding: 13px 16px; appearance: none; outline: none; }

  .btn { width: 100%; padding: 18px; border: none; border-radius: var(--radius); font-size: 17px; font-weight: 700; font-family: 'Jua', sans-serif; cursor: pointer; background: linear-gradient(135deg, var(--primary) 0%, #6b8ff5 100%); color: #fff; box-shadow: 0 6px 24px rgba(61,110,232,0.2); margin-top: 10px; }

  .result { display: none; }
  .result.show { display: block; }
  .result-card { background: var(--white); border-radius: var(--radius); border: 1.5px solid var(--border); box-shadow: 0 8px 40px rgba(61,110,232,0.12); margin-bottom: 20px; overflow: hidden; }
  .result-header { padding: 30px; text-align: center; border-bottom: 1.5px solid var(--border); background: #f8faff; }
  .result-emoji { font-size: 50px; display: block; margin-bottom: 10px; }
  .result-name { font-family: 'Jua', sans-serif; font-size: 26px; color: var(--primary); }
  .result-body { padding: 25px; }
  
  /* 추가된 정보 입력 폼 */
  .info-form { background: #f8faff; border-radius: 15px; padding: 20px; margin-top: 20px; border: 1px dashed var(--primary); }
  .info-form-title { font-family: 'Jua', sans-serif; color: var(--primary); margin-bottom: 15px; text-align: center; }
  .info-input-group { margin-bottom: 10px; }
  .info-input-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }

  .link-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
  .link-btn { display: block; text-align: center; padding: 14px; border-radius: 12px; background: var(--white); border: 1.5px solid var(--border); color: var(--primary); text-decoration: none; font-size: 14px; font-family: 'Jua', sans-serif; }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <img src="major_icon.png" class="header-illust-img" alt="메인 전공 아이콘">
    <h1>10초만에 완성하는<br><span class="highlight">나만의 전공 커스텀</span></h1>
    <br>
    <p>내가 듣고 싶은 전공들만 쏙쏙 골라 담아보세요! 🐑</p>
  </div>

  <div id="formSection">
    <div class="card">
      <div class="card-label"><div class="card-num n1">1</div><div class="card-title">첫 번째 관심 전공</div></div>
      <select id="sel1"><option value="">— 전공을 선택하세요 —</option></select>
    </div>
    <div class="card">
      <div class="card-label"><div class="card-num n2">2</div><div class="card-title">두 번째 관심 전공</div></div>
      <select id="sel2"><option value="">— 전공을 선택하세요 —</option></select>
    </div>
    <div class="card">
      <div class="card-label"><div class="card-num n3">3</div><div class="card-title">세 번째 관심 전공</div></div>
      <select id="sel3"><option value="">— 전공을 선택하세요 —</option></select>
    </div>
    <button class="btn" onclick="calculate()">✨ 내 설계전공 결과 보기</button>
  </div>

  <div class="result" id="resultSection">
    <div id="captureArea">
      <div class="result-card">
        <div id="resultContent"></div>
        <div class="info-form">
          <div class="info-form-title">🎁 이벤트 응모 정보</div>
          <div class="info-input-group"><label>이름</label><input type="text"
