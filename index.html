<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 전공 커스텀</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* 변수 설정: 가독성을 위해 색상을 명확하게 지정 */
  :root { 
    --bg: #f0f4ff; 
    --white: #ffffff; 
    --primary: #3d6ee8; 
    --accent: #ff8fab; 
    --text: #2b2d42; 
    --text-muted: #7b7f9e; 
    --border: #dde3f8; 
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  /* 배경색과 기본 글자색을 강제로 지정 */
  body { 
    background-color: var(--bg) !important; 
    color: var(--text) !important; 
    font-family: 'Noto Sans KR', sans-serif; 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    padding: 40px 20px;
  }
  
  .wrap { width: 100%; max-width: 500px; z-index: 10; }
  
  .header { text-align: center; margin-bottom: 30px; }
  .header img { width: 180px; display: block; margin: 0 auto 15px; }
  .header h1 { font-family: 'Jua', sans-serif; font-size: 32px; color: var(--primary); margin-bottom: 10px; }
  .header p { font-size: 16px; color: var(--text-muted); }

  .card { 
    background: var(--white); 
    border-radius: 20px; 
    padding: 25px; 
    margin-bottom: 20px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    border: 1px solid var(--border);
  }

  .card-title { font-family: 'Jua', sans-serif; font-size: 18px; margin-bottom: 15px; display: block; }
  
  select, input { 
    width: 100%; 
    padding: 15px; 
    border-radius: 12px; 
    border: 1px solid var(--border); 
    background-color: #f9f9f9;
    font-size: 15px;
    margin-bottom: 10px;
    outline: none;
  }

  .btn { 
    width: 100%; 
    padding: 18px; 
    border: none; 
    border-radius: 15px; 
    background: var(--primary); 
    color: #fff; 
    font-family: 'Jua', sans-serif; 
    font-size: 18px; 
    cursor: pointer; 
    transition: 0.2s;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-2px); }

  /* 섹션 제어 */
  .info-section, .result { display: none; }
  .active { display: block !important; }

  .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
</style>
</head>
<body>

<div class="wrap">
  <div id="formSection" class="active">
    <div class="header">
      <img src="major_icon.png" alt="캐릭터">
      <h1>나만의 전공 커스텀</h1>
      <p>관심 있는 전공 3개를 골라주세요!</p>
    </div>
    
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <div class="card">
      <span class="card-title">첫 번째 전공</span>
      <select id="sel1" onchange="updateProgress()">
        <option value="">선택하세요</option>
      </select>
    </div>
    <div class="card">
      <span class="card-title">두 번째 전공</span>
      <select id="sel2" onchange="updateProgress()">
        <option value="">선택하세요</option>
      </select>
    </div>
    <div class="card">
      <span class="card-title">세 번째 전공</span>
      <select id="sel3" onchange="updateProgress()">
        <option value="">선택하세요</option>
      </select>
    </div>
    <button class="btn" onclick="nextStep()">✨ 조합 확인하기</button>
  </div>

  <div id="infoSection" class="info-section">
    <div class="card">
      <h2 style="margin-bottom:20px; font-family:'Jua'">정보 입력</h2>
      <input type="text" id="userName" placeholder="이름">
      <input type="text" id="userId" placeholder="학번">
      <input type="text" id="userDept" placeholder="소속학과">
      <button class="btn" onclick="showResult()">결과 보기 🎓</button>
    </div>
  </div>

  <div id="resultSection" class="result">
    <div class="card" style="text-align:center">
      <h1 id="resultName" style="color:var(--primary); font-family:'Jua'"></h1>
      <p id="resultDesc" style="margin: 20px 0; line-height:1.6"></p>
      <button class="btn" onclick="location.reload()">🔄 다시 하기</button>
    </div>
  </div>
</div>

<script>
const depts = ["AI의공학과","경영학과","경제학과","공간디자인·소비자학과","국사학과","국어국문학과","국제학부","데이터사이언스학과","물리학과","미디어기술콘텐츠학과","바이오로직스공학부","바이오메디컬소프트웨어학과","바이오메디컬화학공학과","법학과","사회복지학과","사회학과","생명공학과","수학과","식품영양학과","심리학과","아동학과","에너지환경공학과","영어영문학부","음악과","의류학과","의생명과학과","인공지능학과","일어일본문화학과","정보통신전자공학부","중국언어문화학과","철학과","컴퓨터정보공학부","특수교육과","프랑스어문화학과","행정학과","화학과","회계학과"];

// 셀렉트 박스 채우기
['sel1','sel2','sel3'].forEach(id => {
  const s = document.getElementById(id);
  depts.forEach(d => {
    const o = document.createElement('option');
    o.value = d; o.textContent = d; s.appendChild(o);
  });
});

function updateProgress() {
  const filled = ['sel1','sel2','sel3'].filter(id => document.getElementById(id).value !== '').length;
  document.getElementById('progressFill').style.width = (filled / 3 * 100) + '%';
}

function nextStep() {
  const v1 = document.getElementById('sel1').value;
  const v2 = document.getElementById('sel2').value;
  const v3 = document.getElementById('sel3').value;
  if(!v1 || !v2 || !v3) { alert('전공 3개를 모두 골라주세요!'); return; }
  
  document.getElementById('formSection').classList.remove('active');
  document.getElementById('infoSection').classList.add('active');
}

function showResult() {
  const name = document.getElementById('userName').value;
  if(!name) { alert('이름을 입력해주세요!'); return; }

  document.getElementById('infoSection').classList.remove('active');
  document.getElementById('resultSection').classList.add('active');
  
  document.getElementById('resultName').textContent = name + "님만을 위한 전공!";
  document.getElementById('resultDesc').textContent = "선택하신 전공들을 융합하여 새로운 미래 학문을 설계했습니다. 학생설계전공 신청을 통해 공식 전공으로 만들어보세요!";
}
</script>
</body>
</html>
