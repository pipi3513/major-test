<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 전공 커스텀</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #f0f4ff; --white: #ffffff; --primary: #3d6ee8; --primary-light: #eef2ff; --accent: #ff8fab; --text: #2b2d42; --text-muted: #7b7f9e; --border: #dde3f8; --radius: 20px; --shadow: 0 4px 24px rgba(61,110,232,0.10); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 80px; }
  .wrap { width: 100%; max-width: 600px; }
  .header { text-align: center; margin-bottom: 36px; animation: fadeDown 0.7s ease both; }
  .header img { width: 200px; margin-bottom: 12px; animation: bounceIn 0.8s 0.2s ease both; display: block; margin: 0 auto 12px; }
  .header h1 { font-family: 'Jua', sans-serif; font-size: clamp(24px, 6vw, 38px); color: var(--primary); line-height: 1.3; margin-bottom: 14px; }
  .header h1 .highlight { color: var(--text); }
  .header p { color: var(--text-muted); font-size: 15px; line-height: 1.8; background: var(--white); display: inline-block; padding: 10px 22px; border-radius: 100px; border: 1.5px solid var(--border); box-shadow: var(--shadow); }
  .progress-wrap { margin-bottom: 24px; }
  .progress-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 700; }
  .progress-bar { height: 8px; background: var(--border); border-radius: 100px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 100px; transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow); animation: fadeUp 0.5s ease both; }
  .card-label { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .card-num { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Jua', sans-serif; font-size: 16px; flex-shrink: 0; border: 1.5px solid #dde3f8; }
  .card-title { font-size: 15px; font-weight: 700; font-family: 'Jua', sans-serif; }
  .select-wrap { position: relative; }
  select { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 13px; appearance: none; cursor: pointer; outline: none; }
  .btn { width: 100%; padding: 18px; border: none; border-radius: var(--radius); font-size: 17px; font-weight: 700; font-family: 'Jua', sans-serif; cursor: pointer; background: linear-gradient(135deg, var(--primary), #6b8ff5); color: #fff; box-shadow: 0 6px 24px rgba(61,110,232,0.28); margin-top: 8px; }
  .info-section, .result { display: none; }
  .show { display: block !important; }
  input[type=text] { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 13px; outline: none; margin-bottom: 10px; }
  .retry-btn { width: 100%; padding: 12px; border-radius: 12px; background: #fff; border: 1px solid var(--border); cursor: pointer; margin-top: 10px; font-family: 'Jua', sans-serif; }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes bounceIn { 0% { transform:scale(0); } 60% { transform:scale(1.1); } 100% { transform:scale(1); } }
</style>
</head>
<body>
<div class="wrap">
  <div id="formSection">
    <div class="header">
      <img src="major_icon.png" alt="캐릭터">
      <h1>10초만에 완성하는<br><span class="highlight">나만의 전공 커스텀</span></h1>
      <p>내가 듣고 싶은 전공들만 골라 담아보세요!</p>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="card">
      <div class="card-label"><div class="card-num" style="color:var(--accent)">1</div><div class="card-title">첫 번째 전공</div></div>
      <div class="select-wrap"><select id="sel1" onchange="updateProgress()"><option value="">— 선택하세요 —</option></select></div>
    </div>
    <div class="card">
      <div class="card-label"><div class="card-num" style="color:#e6a800">2</div><div class="card-title">두 번째 전공</div></div>
      <div class="select-wrap"><select id="sel2" onchange="updateProgress()"><option value="">— 선택하세요 —</option></select></div>
    </div>
    <div class="card">
      <div class="card-label"><div class="card-num" style="color:var(--primary)">3</div><div class="card-title">세 번째 전공</div></div>
      <div class="select-wrap"><select id="sel3" onchange="updateProgress()"><option value="">— 선택하세요 —</option></select></div>
    </div>
    <button class="btn" onclick="goToInfo()">✨ 커스텀 완성</button>
  </div>

  <div class="info-section" id="infoSection">
    <div class="card">
      <h2 style="text-align:center; margin-bottom:15px; font-family:'Jua'">참여자 정보 입력</h2>
      <input type="text" id="inputName" placeholder="이름">
      <input type="text" id="inputStudentId" placeholder="학번">
      <input type="text" id="inputDept" placeholder="소속학과">
      <button class="btn" onclick="submitAndShowResult()">결과 확인하기 🎓</button>
    </div>
  </div>

  <div class="result" id="resultSection">
    <div id="resultCard" class="card" style="text-align:center"></div>
    <button class="retry-btn" onclick="location.reload()">🔄 다시 하기</button>
  </div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzEEcPT4__KE2ubRksutHm4Da8lWPChm1_vbpBa8SwvgKbRC0JJJnPq5F2YdjCxXSA/exec';
const depts = ["AI의공학과","경영학과","경제학과","공간디자인·소비자학과","국사학과","국어국문학과","국제학부","데이터사이언스학과","물리학과","미디어기술콘텐츠학과","바이오로직스공학부","바이오메디컬소프트웨어학과","바이오메디컬화학공학과","법학과","사회복지학과","사회학과","생명공학과","수학과","식품영양학과","심리학과","아동학과","에너지환경공학과","영어영문학부","음악과","의류학과","의생명과학과","인공지능학과","일어일본문화학과","정보통신전자공학부","중국언어문화학과","철학과","컴퓨터정보공학부","특수교육과","프랑스어문화학과","행정학과","화학과","회계학과"];

const selIds = ['sel1','sel2','sel3'];
selIds.forEach(id => {
  const s = document.getElementById(id);
  depts.forEach(d => { const o = document.createElement('option'); o.value=d; o.textContent=d; s.appendChild(o); });
});

function updateProgress() {
  const filled = selIds.filter(id => document.getElementById(id).value !== '').length;
  document.getElementById('progressFill').style.width = (filled/3*100) + '%';
}

function goToInfo() {
  const vals = selIds.map(id => document.getElementById(id).value);
  if(vals.includes('')) { alert('3개 모두 선택해주세요!'); return; }
  document.getElementById('formSection').style.display='none';
  document.getElementById('infoSection').classList.add('show');
}

function submitAndShowResult() {
  const name = document.getElementById('inputName').value;
  if(!name) { alert('정보를 입력해주세요!'); return; }
  
  // 간단 결과 생성 (로직 요약)
  const resCard = document.getElementById('resultCard');
  resCard.innerHTML = `<h2 style="color:var(--primary)">커스텀 전공 완성!</h2><p style="margin-top:10px">${name}님만의 멋진 전공이 설계되었습니다.</p>`;
  
  document.getElementById('infoSection').classList.remove('show');
  document.getElementById('resultSection').classList.add('show');
  
  // 데이터 전송
  fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: name }) });
}
</script>
</body>
</html>
