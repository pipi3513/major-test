<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 전공 커스텀</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #f0f4ff; --white: #ffffff; --primary: #3d6ee8;
            --primary-light: #eef2ff; --accent: #ff8fab; --text: #2b2d42;
            --border: #dde3f8; --radius: 20px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
        }
        .wrap { width: 100%; max-width: 600px; }
        .header { text-align: center; margin-bottom: 36px; }
        .header-illust-img { height: 120px; margin-bottom: 16px; }
        .header h1 { font-family: 'Jua', sans-serif; font-size: 32px; color: var(--primary); margin-bottom: 10px; }
        .header p { color: #7b7f9e; font-size: 15px; background: #fff; padding: 10px 20px; border-radius: 100px; border: 1.5px solid var(--border); display: inline-block; }
        
        .card { background: #fff; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
        .card-label { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        
        /* 🎨 원본 숫자 색상 복구 */
        .card-num { width: 30px; height: 30px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Jua', sans-serif; font-size: 14px; }
        .card-num.n1 { background: #fff0f3; color: #ff8fab; border: 1px solid #ffd6e0; }
        .card-num.n2 { background: #fffbea; color: #e6a800; border: 1px solid #ffe566; }
        .card-num.n3 { background: #eef2ff; color: #3d6ee8; border: 1px solid #c5d4f8; }

        .card-title { font-size: 15px; font-weight: 700; font-family: 'Jua', sans-serif; }
        select { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 13px; outline: none; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: var(--radius); font-size: 17px; font-weight: 700; font-family: 'Jua', sans-serif; cursor: pointer; background: var(--primary); color: #fff; margin-top: 10px; }

        .result { display: none; width: 100%; }
        .result.show { display: block; }
        .result-card { background: #fff; border-radius: var(--radius); border: 1.5px solid var(--border); overflow: hidden; margin-bottom: 20px; }
        .result-header { padding: 30px; text-align: center; border-bottom: 1.5px solid var(--border); background: #f8faff; }
        .result-emoji { font-size: 50px; display: block; margin-bottom: 10px; }
        .result-name { font-family: 'Jua', sans-serif; font-size: 26px; color: var(--primary); }
        .result-body { padding: 25px; }

        /* 이벤트 정보 입력칸 */
        .info-form { background: #f8faff; border-radius: 15px; padding: 20px; margin-top: 20px; border: 1px dashed var(--primary); }
        .info-form-title { font-family: 'Jua', sans-serif; color: var(--primary); margin-bottom: 15px; text-align: center; }
        .info-input-group { margin-bottom: 10px; }
        .info-input-group label { display: block; font-size: 12px; color: #7b7f9e; margin-bottom: 4px; }
        .info-input-group input { width: 100%; padding: 10px; border: 1.5px solid var(--border); border-radius: 8px; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="header">
        <img src="major_icon.png" class="header-illust-img" alt="메인 전공 아이콘">
        <h1>10초만에 완성하는<br>나만의 전공 커스텀</h1>
        <br>
        <p>내가 듣고 싶은 전공들만 쏙쏙 골라 담아보세요! 🐑</p>
    </div>

    <div id="formSection">
        <div class="card">
            <div class="card-label"><div class="card-num n1">1</div><div class="card-title">첫 번째 관심 전공</div></div>
            <select id="sel1"><option value="">— 전공을 선택하세요 —</option></select>
        </div>
        <div class="card">
            <div class="card-label"><div class="card-num n2">2</div><div class="card-title">두 번째 관심 전공</div></div>
            <select id="sel2"><option value="">— 전공을 선택하세요 —</option></select>
        </div>
        <div class="card">
            <div class="card-label"><div class="card-num n3">3</div><div class="card-title">세 번째 관심 전공</div></div>
            <select id="sel3"><option value="">— 전공을 선택하세요 —</option></select>
        </div>
        <button class="btn" onclick="calculate()">✨ 내 설계전공 결과 보기</button>
    </div>

    <div class="result" id="resultSection">
        <div id="captureArea">
            <div class="result-card">
                <div id="resultContent"></div>
                <div class="info-form">
                    <div class="info-form-title">🎁 이벤트 참여 정보</div>
                    <div class="info-input-group"><label>이름</label><input type="text" id="userName" placeholder="실명 입력"></div>
                    <div class="info-input-group"><label>학번</label><input type="text" id="userId" placeholder="학번 8자리"></div>
                    <div class="info-input-group"><label>소속학과</label><input type="text" id="userDept" placeholder="현재 전공 학과"></div>
                </div>
            </div>
        </div>
        <button class="btn" onclick="saveAsImage()">📸 결과 이미지 저장하기</button>
        <button style="width:100%; background:none; border:none; color:#aaa; margin-top:20px; cursor:pointer;" onclick="location.reload()">🔄 다시 하기</button>
    </div>
</div>

<script>
const departments = ["AI의공학과","경영학과","경제학과","공간디자인·소비자학과","국사학과","국어국문학과","국제학부","데이터사이언스학과","물리학과","미디어기술콘텐츠학과","바이오로직스공학부","바이오메디컬소프트웨어학과","바이오메디컬화학공학과","법학과","사회복지학과","사회학과","생명공학과","수학과","식품영양학과","심리학과","아동학과","에너지환경공학과","영어영문학부","음악과","의류학과","의생명과학과","인공지능학과","일어일본문화학과","정보통신전자공학부","중국언어문화학과","철학과","컴퓨터정보공학부","특수교육과","프랑스어문화학과","행정학과","화학과","회계학과"].sort();

const majors = [
    {name:"게임기획경영학", depts:["경영학과","경제학과","미디어기술콘텐츠학과","컴퓨터정보공학부"], emoji:"🕹️", desc:"게임을 기획하고 비즈니스로 연결하는 융합 인재!"},
    {name:"게임경영학", depts:["경영학과","미디어기술콘텐츠학과","컴퓨터정보공학부"], emoji:"🎮", desc:"게임 비즈니스 모델 설계에 특화된 전문가!"},
    {name:"사회언론정보학", depts:["국어국문학과","사회학과","행정학과"], emoji:"📰", desc:"사회 현상을 분석하고 전달하는 저널리즘 전문가!"}
];

// 셀렉트 박스 채우기
['sel1','sel2','sel3'].forEach(id => {
    const sel = document.getElementById(id);
    departments.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d; opt.textContent = d; sel.appendChild(opt);
    });
});

function calculate() {
    const v1=document.getElementById('sel1').value;
    const v2=document.getElementById('sel2').value;
    const v3=document.getElementById('sel3').value;
    if(!v1||!v2||!v3){ alert('전공 3개를 모두 선택해주세요!'); return; }
    if(v1===v2||v2===v3||v1===v3){ alert('서로 다른 전공을 선택해주세요!'); return; }

    const selected = [v1, v2, v3];
    let best = null;
    let maxMatchRate = 0;

    majors.forEach(m => {
        const overlap = selected.filter(s => m.depts.includes(s)).length;
        const matchRate = overlap / m.depts.length;
        if (overlap >= 2 && matchRate > maxMatchRate) {
            maxMatchRate = matchRate;
            best = m;
        }
    });

    document.getElementById('formSection').style.display = 'none';
    const resSection = document.getElementById('resultSection');
    const content = document.getElementById('resultContent');

    if(best && maxMatchRate >= 0.6) {
        content.innerHTML = `<div class="result-header"><span class="result-emoji">${best.emoji}</span><div class="result-name">${best.name}</div></div><div class="result-body"><p style="color:#666; font-size:14px;">당신에게 추천하는 설계전공!</p><br><p>${best.desc}</p></div>`;
    } else {
        content.innerHTML = `<div class="result-header"><span class="result-emoji">🚀</span><div class="result-name">새로운 전공 개척자</div></div><div class="result-body"><p style="color:#666; font-size:14px;">이 조합은 최초예요!</p><br><p>나만의 설계전공을 직접 만들어 학교의 첫 주인공이 되어보세요!</p></div>`;
    }
    resSection.classList.add('show');
}

function saveAsImage() {
    const name = document.getElementById('userName').value;
    const id = document.getElementById('userId').value;
    if(!name || !id) { alert('이름과 학번을 입력해주세요!'); return; }

    const target = document.getElementById('captureArea');
    html2canvas(target).then(canvas => {
        const link = document.createElement('a');
        link.download = `설계전공_${name}.png`;
        link.href = canvas.toDataURL();
        link.click();
        alert("이미지가 저장되었습니다! ✨");
    });
}
</script>
</body>
</html>
