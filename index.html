<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 전공 커스텀</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #f0f4ff;
    --white: #ffffff;
    --primary: #3d6ee8;
    --primary-light: #eef2ff;
    --accent: #ff8fab; /* 핑크 */
    --accent2: #ffcc00; /* 노랑 */
    --step-color: #a29bfe; /* 학년용 보라 */
    --text: #2b2d42;
    --text-muted: #7b7f9e;
    --border: #dde3f8;
    --radius: 20px;
    --shadow: 0 4px 24px rgba(61,110,232,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    background-image: radial-gradient(circle at 10% 20%, rgba(61,110,232,0.07) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(255,143,171,0.08) 0%, transparent 40%);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }
  .wrap { width: 100%; max-width: 600px; }
  .header { text-align: center; margin-bottom: 36px; animation: fadeDown 0.7s ease both; }
  .header-illust-img { height: 130px; width: auto; margin-bottom: 16px; display: block; margin-left: auto; margin-right: auto; animation: bounceIn 0.8s 0.2s ease both; }
  .header h1 { font-family: 'Jua', sans-serif; font-size: clamp(24px, 6vw, 38px); color: var(--primary); line-height: 1.3; margin-bottom: 14px; }
  .header p { color: var(--text-muted); font-size: 15px; line-height: 1.6; background: var(--white); display: inline-block; padding: 10px 22px; border-radius: 100px; border: 1.5px solid var(--border); box-shadow: var(--shadow); }
  
  /* 단계별 섹션 */
  .step-section { display: none; }
  .step-section.active { display: block; animation: fadeUp 0.5s ease both; }
  
  .card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow); transition: transform 0.2s; }
  .card:hover { transform: translateY(-2px); }
  .card-label { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  
  /* 🎨 다시 살려낸 알록달록 숫자 디자인 */
  .card-num { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Jua', sans-serif; font-size: 16px; flex-shrink: 0; }
  .card-num.step { background: #f3f0ff; color: var(--step-color); border: 1.5px solid #dcd3ff; } /* 보라 */
  .card-num.n1 { background: #fff0f3; color: var(--accent); border: 1.5px solid #ffd6e0; } /* 핑크 */
  .
