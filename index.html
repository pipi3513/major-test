<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 전공 커스텀</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --white: #ffffff;
    --primary: #3d6ee8;
    --primary-light: #eef2ff;
    --accent: #ff8fab;
    --text: #2b2d42;
    --text-muted: #7b7f9e;
    --border: #dde3f8;
    --radius: 20px;
    --shadow: 0 4px 24px rgba(61,110,232,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 80px; }
  .wrap { width: 100%; max-width: 600px; }
  .header { text-align: center; margin-bottom: 36px; animation: fadeDown 0.7s ease both; }
  .header img { width: 200px; margin-bottom: 12px; animation: bounceIn 0.8s 0.2s ease both; mix-blend-mode: multiply; }
  .header h1 { font-family: 'Jua', sans-serif; font-size: clamp(24px, 6vw, 38px); color: var(--primary); line-height: 1.3; margin-bottom: 14px; }
  .header h1 .highlight { color: var(--text); }
  .header p { color: var(--text-muted); font-size: 15px; line-height: 1.8; background: var(--white); display: inline-block; padding: 10px 22px; border-radius: 100px; border: 1.5px solid var(--border); box-shadow: var(--shadow); }
  .progress-wrap { margin-bottom: 24px; }
  .progress-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 700; }
  .progress-bar { height: 8px; background: var(--border); border-radius: 100px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 100px; transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow); animation: fadeUp 0.5s ease both; transition: box-shadow 0.2s, transform 0.2s; }
  .card:hover { box-shadow: 0 8px 32px rgba(61,110,232,0.14); transform: translateY(-2px); }
  .card-label { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .card-num { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Jua', sans-serif; font-size: 16px; flex-shrink: 0; }
  .card-num.n1 { background: #fff0f3; color: var(--accent); border: 1.5px solid #ffd6e0; }
  .card-num.n2 { background: #fffbea; color: #e6a800; border: 1.5px solid #ffe566; }
  .card-num.n3 { background: var(--primary-light); color: var(--primary); border: 1.5px solid #c5d4f8; }
  .card-title { font-size: 15px; font-weight: 700; color: var(--text); font-family: 'Jua', sans-serif; }
  .card-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .select-wrap { position: relative; }
  select { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); font-size: 14px; font-family: 'Noto Sans KR', sans-serif; padding: 13px 44px 13px 16px; appearance: none; cursor: pointer; transition: border-color 0.2s; outline: none; }
  select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(61,110,232,0.12); background: var(--white); }
  .select-arrow { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-muted); font-size: 11px; }
  .btn { width: 100%; padding: 18px; border: none; border-radius: var(--radius); font-size: 17px; font-weight: 700; font-family: 'Jua', sans-serif; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; background: linear-gradient(135deg, var(--primary) 0%, #6b8ff5 100%); color: #fff; box-shadow: 0 6px 24px rgba(61,110,232,0.28); margin-top: 8px; display: block; text-align: center; text-decoration: none; }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(61,110,232,0.35); }
  .btn:active { transform: translateY(0); }
  .btn.link-btn { background: linear-gradient(135deg, #ff8fab, #ffcc00); color: #2b2d42; box-shadow: 0 6px 20px rgba(255,143,171,0.3); margin-top: 10px; font-size: 15px; }
  .btn.link-btn2 { background: linear-gradient(135deg, #3d6ee8, #6b8ff5); margin-top: 10px; font-size: 15px; }
  .warning { color: var(--accent); font-size: 13px; margin-top: 10px; display: none; text-align: center; font-weight: 700; }
  .warning.show { display: block; }
  .info-section { display: none; animation: fadeUp 0.5s ease both; }
  .info-section.show { display: block; }
  .info-header { text-align: center; margin-bottom: 28px; }
  .info-header .emoji { font-size: 48px; display: block; margin-bottom: 12px; }
  .info-header h2 { font-family: 'Jua', sans-serif; font-size: 24px; color: var(--primary); margin-bottom: 8px; }
  .info-header p { color: var(--text-muted); font-size: 14px; line-height: 1.7; }
  .input-group { margin-bottom: 14px; }
  .input-label { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; display: block; }
  input[type=text] { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); font-size: 14px; font-family: 'Noto Sans KR', sans-serif; padding: 13px 16px; outline: none; transition: border-color 0.2s; }
  input[type=text]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(61,110,232,0.12); background: var(--white); }
  .result { display: none; }
  .result.show { display: block; animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
  .result-card { background: var(--white); border-radius: var(--radius); overflow: hidden; border: 1.5px solid var(--border); box-shadow: 0 8px 40px rgba(61,110,232,0.12); }
  .result-header { padding: 36px 28px 28px; text-align: center; }
  .result-header.matched { background: linear-gradient(160deg, #eef2ff 0%, #f8f0ff 100%); border-bottom: 1.5px solid var(--border); }
  .result-header.new-one { background: linear-gradient(160deg, #fff5f7 0%, #fffbea 100%); border-bottom: 1.5px solid var(--border); }
  .result-emoji { font-size: 64px; display: block; margin-bottom: 16px; animation: bounceIn 0.6s 0.2s ease both; }
  .result-tag { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; padding: 4px 14px; border-radius: 100px; margin-bottom: 14px; font-family: 'Jua', sans-serif; }
  .result-tag.matched { background: var(--primary-light); color: var(--primary); border: 1px solid #c5d4f8; }
  .result-tag.new-one { background: #fff0f3; color: var(--accent); border: 1px solid #ffd6e0; }
  .result-name { font-family: 'Jua', sans-serif; font-size: clamp(20px, 5vw, 28px); line-height: 1.3; }
  .result-name.matched { color: var(--primary); }
  .result-name.new-one { color: var(--accent); }
  .result-body { padding: 24px 28px 28px; }
  .result-desc { font-size: 15px; line-height: 1.9; color: var(--text-muted); margin-bottom: 20px; }
  .selected-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .selected-tag { background: var(--primary-light); border: 1px solid #c5d4f8; border-radius: 100px; padding: 6px 14px; font-size: 12px; color: var(--primary); font-weight: 700; }
  .retry-btn { width: 100%; padding: 15px; border-radius: 14px; background: var(--white); border: 1.5px solid var(--border); color: var(--text-muted); font-size: 14px; font-family: 'Jua', sans-serif; cursor: pointer; transition: all 0.2s; margin-top: 12px; }
  .retry-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  .submit-status { text-align: center; font-size: 13px; color: var(--primary); margin-top: 10px; min-height: 20px; font-weight: 700; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes popIn { from { opacity: 0; transform: scale(0.93); } to { opacity: 1; transform: scale(1); } }
  @keyframes bounceIn { 0% { transform: scale(0) rotate(-10deg); } 60% { transform: scale(1.15) rotate(5deg); } 100% { transform: scale(1) rotate(0deg); } }
</style>
</head>

let selectedMajors=[], calculatedResult=null;

['sel1','sel2','sel3'].forEach(id=>{
  const sel=document.getElementById(id);
  departments.forEach(d=>{const opt=document.createElement('option');opt.value=d;opt.textContent=d;sel.appendChild(opt);});
});

function updateProgress(){
  const filled=['sel1','sel2','sel3'].filter(id=>document.getElementById(id).value!=='').length;
  document.getElementById('progressFill').style.width=(filled/3*100)+'%';
}

function goToInfo(){
  const v1=document.getElementById('sel1').value, v2=document.getElementById('sel2').value, v3=document.getElementById('sel3').value;
  const warn=document.getElementById('warning');
  if(!v1||!v2||!v3){warn.textContent='⚠️ 전공 3개를 모두 선택해주세요!';warn.classList.add('show');return;}
  if(v1===v2||v2===v3||v1===v3){warn.textContent='⚠️ 서로 다른 전공 3개를 선택해주세요!';warn.classList.add('show');return;}
  warn.classList.remove('show');
  selectedMajors=[v1,v2,v3];
  calculatedResult=calcResult(selectedMajors);
  document.getElementById('formSection').style.display='none';
  document.getElementById('infoSection').classList.add('show');
  window.scrollTo({top:0,behavior:'smooth'});
}

function calcResult(selected){
  let candidates=[];
  majors.forEach(m=>{
    const overlap=selected.filter(s=>m.depts.includes(s)).length;
    if(overlap>=3) candidates.push({major:m, ratio:overlap/m.depts.length});
  });
  if(!candidates.length) return null;
  candidates.sort((a,b)=>b.ratio-a.ratio);
  const topRatio=candidates[0].ratio;
  const top=candidates.filter(c=>c.ratio===topRatio);
  return top[Math.floor(Math.random()*top.length)].major;
}

function submitAndShowResult(){
  const name=document.getElementById('inputName').value.trim();
  const studentId=document.getElementById('inputStudentId').value.trim();
  const dept=document.getElementById('inputDept').value.trim();
  const warn=document.getElementById('infoWarning');
  if(!name||!studentId||!dept){warn.textContent='⚠️ 모든 항목을 입력해주세요!';warn.classList.add('show');return;}
  warn.classList.remove('show');
  document.getElementById('infoSection').classList.remove('show');
  showResult(calculatedResult, selectedMajors);
  fetch(SHEET_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({name,studentId,department:dept,major1:selectedMajors[0],major2:selectedMajors[1],major3:selectedMajors[2],result:calculatedResult?calculatedResult.name:'매칭없음'})})
    .then(()=>document.getElementById('submitStatus').textContent='✅ 참여 완료! 추첨 결과를 기다려주세요 🎉')
    .catch(()=>document.getElementById('submitStatus').textContent='✅ 참여 완료! 추첨 결과를 기다려주세요 🎉');
}

function showResult(major,selected){
  const card=document.getElementById('resultCard');
  const saveBtn='<button class="btn" onclick="saveResultImage()" style="background:linear-gradient(135deg,#6bcb77,#4ec756);box-shadow:0 6px 20px rgba(107,203,119,0.3);margin-top:10px;font-size:15px;">📸 결과 이미지 저장</button>';
  const links=`<a href="${NOTICE_URL}" target="_blank" style="display:block;text-decoration:none"><button class="btn link-btn">📋 학생설계전공 신청 안내 보기</button></a><a href="${HOME_URL}" target="_blank" style="display:block;text-decoration:none"><button class="btn link-btn2">🏫 학생설계전공 소개 홈페이지</button></a>`;
  const tags=selected.map(s=>`<span class="selected-tag">📚 ${s}</span>`).join('');
  if(major){
    card.innerHTML=`<div class="result-header matched"><span class="result-emoji">${major.emoji}</span><div class="result-tag matched">✦ 매칭된 설계전공</div><div class="result-name matched">${major.name}</div></div><div class="result-body"><p class="result-desc">${major.desc}</p><div class="selected-tags">${tags}</div>${saveBtn}${links}</div>`;
  } else {
    card.innerHTML=`<div class="result-header new-one"><span class="result-emoji">🚀</span><div class="result-tag new-one">✦ 새로운 조합 발견!</div><div class="result-name new-one">아직 없는 전공이에요!</div></div><div class="result-body"><p class="result-desc">이 조합으로 승인된 설계전공은 아직 없어요! 어쩌면 당신이 최초일지도? 🌟 나만의 설계전공 직접 만들어보는 건 어떨까요? 학생설계전공 신청으로 새 역사를 써봐요!</p><div class="selected-tags">${tags}</div>${saveBtn}${links}</div>`;
  }
  document.getElementById('resultSection').classList.add('show');
  window.scrollTo({top:0,behavior:'smooth'});
}

function saveResultImage(){
  const el=document.getElementById('resultCard');
  if(typeof html2canvas==='undefined'){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=()=>captureCard(el);
    document.head.appendChild(s);
  } else { captureCard(el); }
}

function captureCard(el){
  html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff'}).then(canvas=>{
    const a=document.createElement('a');
    a.download='나만의전공커스텀결과.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
  });
}

function retry(){
  document.getElementById('formSection').style.display='block';
  document.getElementById('resultSection').classList.remove('show');
  document.getElementById('infoSection').classList.remove('show');
  ['sel1','sel2','sel3'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('submitStatus').textContent='';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
