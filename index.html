<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 전공 커스텀</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #f0f4ff;
    --white: #ffffff;
    --primary: #3d6ee8;
    --primary-light: #eef2ff;
    --accent: #ff8fab;
    --text: #2b2d42;
    --text-muted: #7b7f9e;
    --border: #dde3f8;
    --radius: 20px;
    --shadow: 0 4px 24px rgba(61,110,232,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    background-image: radial-gradient(circle at 10% 20%, rgba(61,110,232,0.07) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(255,143,171,0.08) 0%, transparent 40%);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }
  .wrap { width: 100%; max-width: 600px; }
  .header { text-align: center; margin-bottom: 36px; animation: fadeDown 0.7s ease both; }
  .header-illust-img { height: 120px; width: auto; margin-bottom: 16px; display: block; margin-left: auto; margin-right: auto; animation: bounceIn 0.8s 0.2s ease both; }
  .header h1 { font-family: 'Jua', sans-serif; font-size: clamp(24px, 6vw, 38px); color: var(--primary); line-height: 1.3; margin-bottom: 14px; }
  .header p { color: var(--text-muted); font-size: 15px; line-height: 1.6; background: var(--white); display: inline-block; padding: 10px 22px; border-radius: 100px; border: 1.5px solid var(--border); box-shadow: var(--shadow); }
  
  .card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow); animation: fadeUp 0.5s ease both; }
  .card-label { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .card-num { width: 30px; height: 30px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Jua', sans-serif; font-size: 14px; flex-shrink: 0; background: var(--primary-light); color: var(--primary); border: 1px solid #c5d4f8; }
  .card-title { font-size: 15px; font-weight: 700; font-family: 'Jua', sans-serif; }
  
  select, input[type="text"] { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); font-size: 14px; padding: 13px 16px; appearance: none; outline: none; transition: all 0.2s; }
  select:focus, input[type="text"]:focus { border-color: var(--primary); background: var(--white); box-shadow: 0 0 0 3px rgba(61,110,232,0.1); }

  .btn { width: 100%; padding: 18px; border: none; border-radius: var(--radius); font-size: 17px; font-weight: 700; font-family: 'Jua', sans-serif; cursor: pointer; background: linear-gradient(135deg, var(--primary) 0%, #6b8ff5 100%); color: #fff; box-shadow: 0 6px 24px rgba(61,110,232,0.2); transition: transform 0.15s; }
  .btn:active { transform: translateY(2px); }

  .result { display: none; }
  .result.show { display: block; animation: popIn 0.5s both; }
  .result-card { background: var(--white); border-radius: var(--radius); border: 1.5px solid var(--border); box-shadow: 0 8px 40px rgba(61,110,232,0.12); margin-bottom: 20px; overflow: hidden; }
  .result-header { padding: 30px; text-align: center; border-bottom: 1.5px solid var(--border); background: #f8faff; }
  .result-emoji { font-size: 50px; display: block; margin-bottom: 10px; }
  .result-name { font-family: 'Jua', sans-serif; font-size: 26px; color: var(--primary); }
  .result-body { padding: 25px; }
  
  .info-form { background: #f8faff; border-radius: 15px; padding: 20px; margin-top: 20px; border: 1px dashed var(--primary); }
  .info-form-title { font-family: 'Jua', sans-serif; color: var(--primary); margin-bottom: 15px; text-align: center; font-size: 18px; }
  .info-input-group { margin-bottom: 10px; }
  .info-input-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }

  .link-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
  .link-btn { display: block; text-align: center; padding: 14px; border-radius: 12px; background: var(--white); border: 1.5px solid var(--primary); color: var(--primary); text-decoration: none; font-size: 14px; font-weight: 700; transition: all 0.2s; }
  .link-btn:hover { background: var(--primary-light); }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  @keyframes bounceIn { 0% { transform: scale(0); } 60% { transform: scale(1.1); } 100% { transform: scale(1); } }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <img src="major_icon.png" class="header-illust-img" alt="메인 전공 아이콘">
    <h1>10초만에 완성하는<br><span class="highlight">나만의 전공 커스텀</span></h1>
    <br>
    <p>관심 학과를 담고 커피 기프티콘 받아가세요! ☕️</p>
  </div>

  <div id="formSection">
    <div class="card">
      <div class="card-label"><div class="card-num">0</div><div class="card-title">현재 학년</div></div>
      <select id="grade">
        <option value="">— 학년을 선택하세요 —</option>
        <option>1학년</option><option>2학년</option><option>3학년</option><option>4학년 이상</option>
      </select>
    </div>
    <div class="card">
      <div class="card-label"><div class="card-num">1</div><div class="card-title">첫 번째 관심 전공</div></div>
      <select id="sel1"><option value="">— 전공을 선택하세요 —</option></select>
    </div>
    <div class="card">
      <div class="card-label"><div class="card-num">2</div><div class="card-title">두 번째 관심 전공</div></div>
      <select id="sel2"><option value="">— 전공을 선택하세요 —</option></select>
    </div>
    <div class="card">
      <div class="card-label"><div class="card-num">3</div><div class="card-title">세 번째 관심 전공</div></div>
      <select id="sel3"><option value="">— 전공을 선택하세요 —</option></select>
    </div>
    <button class="btn" onclick="calculate()">✨ 내 설계전공 결과 보기</button>
  </div>

  <div class="result" id="resultSection">
    <div id="captureArea">
      <div class="result-card">
        <div id="resultContent"></div>
        <div class="info-form">
          <div class="info-form-title">🎁 커피 기프티콘 이벤트 참여</div>
          <div class="info-input-group"><label>이름</label><input type="text" id="userName" placeholder="성함"></div>
          <div class="info-input-group"><label>학번</label><input type="text" id="userId" placeholder="학번 8자리"></div>
          <div class="info-input-group"><label>소속학과</label><input type="text" id="userDept" placeholder="현재 전공 학과"></div>
        </div>
      </div>
    </div>
    <button class="btn" onclick="saveAsImage()">📸 결과 이미지 저장 (이벤트 응모)</button>
    <div class="link-group">
      <a href="#" target="_blank" class="link-btn">📢 학생설계전공 신청안내 공지 바로가기</a>
      <a href="#" target="_blank" class="link-btn">📖 학생설계전공 제도 자세히 알아보기</a>
    </div>
    <button style="width:100%; background:none; border:none; color:#aaa; margin-top:20px; cursor:pointer;" onclick="location.reload()">🔄 다시 하기</button>
  </div>
</div>

<script>
const departments = ["AI의공학과","경영학과","경제학과","공간디자인·소비자학과","국사학과","국어국문학과","국제학부","데이터사이언스학과","물리학과","미디어기술콘텐츠학과","바이오로직스공학부","바이오메디컬소프트웨어학과","바이오메디컬화학공학과","법학과","사회복지학과","사회학과","생명공학과","수학과","식품영양학과","심리학과","아동학과","에너지환경공학과","영어영문학부","음악과","의류학과","의생명과학과","인공지능학과","일어일본문화학과","정보통신전자공학부","중국언어문화학과","철학과","컴퓨터정보공학부","특수교육과","프랑스어문화학과","행정학과","화학과","회계학과"];

// 매칭 데이터 (전공 학과가 3개인 경우와 4개인 경우 비교 로직 적용)
const majors = [
  {name:"게임기획경영학", depts:["경영학과","경제학과","미디어기술콘텐츠학과","컴퓨터정보공학부"], emoji:"🕹️", desc:"게임을 기획하고 비즈니스로 연결하는 융합 인재!"},
  {name:"게임경영학", depts:["경영학과","미디어기술콘텐츠학과","컴퓨터정보공학부"], emoji:"🎮", desc:"게임 비즈니스 모델 설계에 특화된 전문가!"},
  {name:"뇌인지공학", depts:["바이오메디컬소프트웨어학과","심리학과","의생명과학과"], emoji:"🧠", desc:"인간의 뇌와 마음을 기술로 풀어내는 미래 공학자!"},
  {name:"사회언론정보학", depts:["국어국문학과","사회학과","행정학과"], emoji:"📰", desc:"사회 현상을 분석하고 전달하는 저널리즘 전문가!"}
  // 추가 전공 데이터를 여기에 넣으세요.
];

['sel1','sel2','sel3'].forEach(id=>{
  const sel=document.getElementById(id);
  departments.sort().forEach(d=>{const opt=document.createElement('option');opt.value=d;opt.textContent=d;sel.appendChild(opt);});
});

function calculate(){
  const g = document.getElementById('grade').value;
  const v1=document.getElementById('sel1').value;
  const v2=document.getElementById('sel2').value;
  const v3=document.getElementById('sel3').value;

  if(!g || !v1||!v2||!v3){ alert('모든 항목을 선택해주세요!'); return; }
  if(v1===v2||v2===v3||v1===v3){ alert('서로 다른 전공 3개를 선택해주세요!'); return; }

  const selected=[v1,v2,v3];
  let best=null;
  let maxMatchRate = 0;

  majors.forEach(m => {
    // 1. 겹치는 학과 개수 계산
    const overlap = selected.filter(s => m.depts.includes(s)).length;
    // 2. 해당 전공의 전체 학과수 대비 매칭 비율 계산 (3/3=1.0, 3/4=0.75)
    const matchRate = overlap / m.depts.length;

    // 💡 [핵심 로직] 최소 2개 이상 겹치면서 매칭률이 가장 높은 전공을 찾음
    if (overlap >= 2 && matchRate > maxMatchRate) {
      maxMatchRate = matchRate;
      best = m;
    }
  });

  // 매칭률이 0.6(60%) 이상인 경우만 매칭 성공으로 인정
  if (best && maxMatchRate >= 0.6) {
    showResult(best, selected, g);
  } else {
    showResult(null, selected, g);
  }
}

function showResult(major, selected, grade){
  document.getElementById('formSection').style.display='none';
  const resSection = document.getElementById('resultSection');
  const content = document.getElementById('resultContent');
  
  if(major){
    content.innerHTML = `<div class="result-header"><span class="result-emoji">${major.emoji}</span><div class="result-tag" style="font-size:11px; color:#3d6ee8; font-weight:700; margin-bottom:5px;">✦ 추천 설계전공</div><div class="result-name">${major.name}</div></div><div class="result-body"><p style="color:#666; font-size:14px; line-height:1.6;">${grade}인 당신에게 딱 맞는 설계전공입니다!<br><br>${major.desc}</p></div>`;
  } else {
    content.innerHTML = `<div class="result-header"><span class="result-emoji">🚀</span><div class="result-name">새로운 전공 개척자</div></div><div class="result-body"><p style="color:#666; font-size:14px; line-height:1.6;">${grade} 당신의 조합은 최초예요!<br><br>선택하신 전공들의 조합은 아주 유니크합니다. 직접 나만의 설계전공을 만들어 학교의 첫 주인공이 되어보세요!</p></div>`;
  }
  resSection.classList.add('show');
  window.scrollTo({top:0, behavior:'smooth'});
}

function saveAsImage() {
  const n = document.getElementById('userName').value;
  const id = document.getElementById('userId').value;
  const d = document.getElementById('userDept').value;
  if(!n || !id || !d) { alert('이벤트 응모를 위해 정보를 모두 입력해주세요!'); return; }

  const target = document.getElementById('captureArea');
  html2canvas(target, { backgroundColor: "#f0f4ff", scale: 2 }).then(canvas => {
    const link = document.createElement('a');
    link.download = `설계전공_${n}_${id}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    alert("이미지가 저장되었습니다! ✨\n공지사항의 안내에 따라 이미지를 제출해주세요.");
  });
}
</script>
</body>
</html>
