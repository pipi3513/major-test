<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 전공 커스텀</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --white: #ffffff;
    --primary: #3d6ee8;
    --primary-light: #eef2ff;
    --accent: #ff8fab;
    --text: #2b2d42;
    --text-muted: #7b7f9e;
    --border: #dde3f8;
    --radius: 20px;
    --shadow: 0 4px 24px rgba(61,110,232,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 80px; }
  .wrap { width: 100%; max-width: 600px; }
  .header { text-align: center; margin-bottom: 36px; animation: fadeDown 0.7s ease both; }
  
  /* 이미지 설정: mix-blend-mode 제거하여 깔끔하게 출력 */
  .header img { 
    width: 200px; 
    margin-bottom: 12px; 
    animation: bounceIn 0.8s 0.2s ease both; 
    display: block;
    margin: 0 auto 12px;
  }

  .header h1 { font-family: 'Jua', sans-serif; font-size: clamp(24px, 6vw, 38px); color: var(--primary); line-height: 1.3; margin-bottom: 14px; }
  .header h1 .highlight { color: var(--text); }
  .header p { color: var(--text-muted); font-size: 15px; line-height: 1.8; background: var(--white); display: inline-block; padding: 10px 22px; border-radius: 100px; border: 1.5px solid var(--border); box-shadow: var(--shadow); }
  /* ... 기존 스타일 유지 ... */
  .progress-wrap { margin-bottom: 24px; }
  .progress-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 700; }
  .progress-bar { height: 8px; background: var(--border); border-radius: 100px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 100px; transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow); animation: fadeUp 0.5s ease both; transition: box-shadow 0.2s, transform 0.2s; }
  .card:hover { box-shadow: 0 8px 32px rgba(61,110,232,0.14); transform: translateY(-2px); }
  .card-label { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .card-num { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Jua', sans-serif; font-size: 16px; flex-shrink: 0; }
  .card-num.n1 { background: #fff0f3; color: var(--accent); border: 1.5px solid #ffd6e0; }
  .card-num.n2 { background: #fffbea; color: #e6a800; border: 1.5px solid #ffe566; }
  .card-num.n3 { background: var(--primary-light); color: var(--primary); border: 1.5px solid #c5d4f8; }
  .card-title { font-size: 15px; font-weight: 700; color: var(--text); font-family: 'Jua', sans-serif; }
  .card-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .select-wrap { position: relative; }
  select { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); font-size: 14px; font-family: 'Noto Sans KR', sans-serif; padding: 13px 44px 13px 16px; appearance: none; cursor: pointer; transition: border-color 0.2s; outline: none; }
  select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(61,110,232,0.12); background: var(--white); }
  .select-arrow { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-muted); font-size: 11px; }
  .btn { width: 100%; padding: 18px; border: none; border-radius: var(--radius); font-size: 17px; font-weight: 700; font-family: 'Jua', sans-serif; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; background: linear-gradient(135deg, var(--primary) 0%, #6b8ff5 10
